<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise ❤️</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ffe6f0,#fff5d6);
        font-family:Arial, sans-serif;
        text-align:center;
        overflow:hidden;
    }

    #container{
        padding:20px;
    }

    button{
        padding:18px 35px;
        font-size:1.3rem;
        border:none;
        border-radius:50px;
        background:#ff5c8a;
        color:white;
        cursor:pointer;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.08);
    }

    #surprise{
        display:none;
        animation:pop 0.8s ease;
    }

    .panda{
        font-size:min(45vw, 300px);
        line-height:1;
    }

    .text{
        margin-top:20px;
        font-size:2rem;
        font-weight:bold;
        color:#444;
    }

    @keyframes pop{
        0%{
            transform:scale(0);
            opacity:0;
        }
        100%{
            transform:scale(1);
            opacity:1;
        }
    }
</style>
</head>
<body>

<div id="container">

    <div id="start">
        <h1>🎁 A Surprise For You 🎁</h1>
        <button onclick="showSurprise()">
            Click Here ❤️
        </button>
    </div>

    <div id="surprise">
        <div class="panda">🐼</div>
        <div class="text">
            Breaking News: Rare adorable panda spotted! That's you! 🤭❤️
        </div>
    </div>

</div>

<script>
function showSurprise(){
    document.getElementById("start").style.display = "none";
    document.getElementById("surprise").style.display = "block";
}
</script>

</body>
</html>
